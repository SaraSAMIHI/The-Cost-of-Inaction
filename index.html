document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r-gradient(160deg,#2A2825 0%,#1A1816 100%); overflow:hidden; padding:clamp(32px,5vw,72px); display:flex; flex-direction:column; justify-content:center;\">\n      <div style=\"position:absolute; inset:0; display:flex; align-items:flex-end; gap:9px; padding:0 40px 0 40px; opacity:0.16;\">\n        <div style=\"width:9%; height:42%; background:#F5F0E6;\"><\u002Fdiv>\n        <div style=\"width:7%; height:66%; background:#F5F0E6;\"><\u002Fdiv>\n        <div style=\"width:8%; height:34%; background:#F5F0E6;\"><\u002Fdiv>\n        <div style=\"width:10%; height:78%; background:#F5F0E6;\"><\u002Fdiv>\n        <div style=\"width:6%; height:50%; background:#F5F0E6;\"><\u002Fdiv>\n        <div style=\"width:9%; height:62%; background:#F5F0E6;\"><\u002Fdiv>\n        <div style=\"width:7%; height:30%; background:#F5F0E6;\"><\u002Fdiv>\n        <div style=\"width:8%; height:54%; background:#F5F0E6;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:#C9714E; margin-bottom:22px;\">An Affordability &amp; Housing Campaign<\u002Fspan>\n        <h1 style=\"font-family:'Anton',sans-serif; font-weight:400; line-height:0.92; letter-spacing:0.01em; margin:0; text-transform:uppercase; font-size:clamp(48px,7vw,104px); color:#F5F0E6;\">The Cost<br>of <span style=\"color:#C0392B;\">Inaction<\u002Fspan><\u002Fh1>\n        <div style=\"width:96px; height:5px; background:#9A2D1F; margin:26px 0 24px;\"><\u002Fdiv>\n        <p style=\"max-width:30ch; margin:0 0 34px; font-size:clamp(17px,1.6vw,21px); line-height:1.5; color:#D9D2C5; font-weight:500;\">Without significant intervention, homelessness in Ontario could <strong style=\"color:#F5F0E6;\">more than triple by 2035.<\u002Fstrong><\u002Fp>\n        <div style=\"display:flex; gap:14px; flex-wrap:wrap;\">\n          <button onclick=\"{{ goData }}\" style=\"background:#9A2D1F; border:none; color:#F5F0E6; font-family:'Libre Franklin',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.02em; padding:15px 28px; border-radius:2px; cursor:pointer;\" style-hover=\"background:#B23A2B;\">Explore the Data<\u002Fbutton>\n          <button onclick=\"{{ goAction }}\" style=\"background:transparent; border:1.5px solid rgba(245,240,230,0.4); color:#F5F0E6; font-family:'Libre Franklin',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.02em; padding:15px 28px; border-radius:2px; cursor:pointer;\" style-hover=\"border-color:#F5F0E6; background:rgba(245,240,230,0.08);\">Take Action<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative; background:linear-gradient(160deg,#EFE8D8 0%,#E4DFCB 100%); overflow:hidden; padding:clamp(32px,5vw,72px); display:flex; flex-direction:column; justify-content:center;\">\n      <div style=\"position:absolute; inset:0; display:flex; align-items:flex-end; justify-content:flex-end; gap:14px; padding:0 44px; opacity:0.14;\">\n        <div style=\"width:64px; height:48%; background:#4F6140;\"><\u002Fdiv>\n        <div style=\"width:64px; height:62%; background:#4F6140;\"><\u002Fdiv>\n        <div style=\"width:64px; height:40%; background:#4F6140;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute; left:-46px; top:50%; transform:translateY(-50%); z-index:3; display:none; animation:pulseArrow 2.2s ease-in-out infinite;\">\n        <svg width=\"92\" height=\"48\" viewBox=\"0 0 92 48\" fill=\"none\"><path d=\"M0 24 H78 M62 8 L82 24 L62 40\" stroke=\"#9A2D1F\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"position:relative; background:#FAF6EC; border:1px solid rgba(33,31,28,0.08); box-shadow:0 24px 60px -28px rgba(33,31,28,0.4); padding:clamp(28px,3.4vw,46px); border-radius:3px; max-width:440px;\">\n        <span style=\"display:block; font-size:13px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:#6B6459;\">Leaving up to<\u002Fspan>\n        <div style=\"font-family:'Anton',sans-serif; font-size:clamp(58px,7.2vw,96px); line-height:0.96; color:#9A2D1F; margin:8px 0 6px; letter-spacing:0.01em;\"><span data-counter=\"294266\">294,266<\u002Fspan><\u002Fdiv>\n        <p style=\"font-family:'Anton',sans-serif; text-transform:uppercase; font-size:clamp(20px,2.2vw,28px); line-height:1.05; margin:0 0 18px; color:#211F1C;\">People without<br>stable housing by 2035.<\u002Fp>\n        <p style=\"margin:0 0 18px; font-size:15px; line-height:1.55; color:#4A453E; font-weight:500; border-left:3px solid #4F6140; padding-left:14px;\">The question is not only what it costs to solve homelessness. The question is what we are <strong>already paying by doing nothing.<\u002Fstrong><\u002Fp>\n        <span style=\"display:block; font-size:11.5px; color:#8A8275; font-style:italic;\">Source: Association of Municipalities of Ontario, <em>Under Pressure<\u002Fem> Report, 2025.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section id=\"why\" style=\"padding:clamp(56px,8vw,110px) clamp(20px,5vw,80px); background:#F5F0E6;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease; max-width:680px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#9A2D1F; margin-bottom:16px;\">Why Should You Care?<\u002Fspan>\n        <h2 style=\"font-family:'Anton',sans-serif; font-weight:400; text-transform:uppercase; font-size:clamp(34px,5vw,60px); line-height:0.98; margin:0 0 18px; letter-spacing:0.01em;\">Homelessness impacts all of us.<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.6; color:#4A453E; margin:0; max-width:56ch;\">It costs our communities far more than we think — creating pressure that ripples across every public system we all rely on.<\u002Fp>\n      <\u002Fdiv>\n\n      <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease .1s, transform .7s ease .1s; display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:46px;\" class=\"why3\">\n        {{ whyCards }}\n      <\u002Fdiv>\n\n      <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease .2s, transform .7s ease .2s; margin-top:40px; background:#211F1C; color:#F5F0E6; padding:clamp(26px,4vw,44px); border-radius:3px;\">\n        <p style=\"margin:0; font-family:'Anton',sans-serif; text-transform:uppercase; font-size:clamp(22px,3vw,38px); line-height:1.08; letter-spacing:0.01em;\">The real question is: how much are we already paying by <span style=\"color:#C0392B;\">doing nothing?<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"spending\" style=\"padding:clamp(56px,8vw,110px) clamp(20px,5vw,80px); background:#EFE8D8;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease; max-width:720px; margin-bottom:48px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#9A2D1F; margin-bottom:16px;\">Ontario's Homelessness Spending<\u002Fspan>\n        <h2 style=\"font-family:'Anton',sans-serif; font-weight:400; text-transform:uppercase; font-size:clamp(34px,5vw,60px); line-height:0.98; margin:0; letter-spacing:0.01em;\">Spending continues to rise.<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"two-col\" style=\"display:grid; grid-template-columns:0.85fr 1.15fr; gap:clamp(28px,5vw,64px); align-items:start;\">\n        <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease; background:#FAF6EC; border:1px solid rgba(33,31,28,0.07); border-radius:3px; padding:clamp(28px,3.5vw,44px);\">\n          <span style=\"display:block; font-size:13px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:#6B6459;\">Total Spending in 2025<\u002Fspan>\n          <div style=\"font-family:'Anton',sans-serif; font-size:clamp(56px,7vw,86px); line-height:0.96; color:#9A2D1F; margin:10px 0 2px;\"><span data-counter=\"2.27\" data-decimals=\"2\" data-prefix=\"$\">$2.27<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Anton',sans-serif; text-transform:uppercase; font-size:clamp(22px,2.4vw,30px); color:#211F1C; line-height:1;\">Billion<\u002Fdiv>\n          <p style=\"margin:18px 0 0; font-size:15px; line-height:1.55; color:#4A453E;\">spent on homelessness programs across the province — and climbing every year.<\u002Fp>\n          <div style=\"margin-top:24px; padding-top:20px; border-top:1px solid rgba(33,31,28,0.1); display:flex; gap:8px; align-items:flex-start;\">\n            <span style=\"width:10px; height:10px; border-radius:50%; background:#9A2D1F; margin-top:5px; flex:none;\"><\u002Fspan>\n            <span style=\"width:10px; height:10px; border-radius:50%; background:#4F6140; margin-top:5px; flex:none;\"><\u002Fspan>\n            <p style=\"margin:0; font-size:13.5px; line-height:1.5; color:#6B6459;\"><strong style=\"color:#9A2D1F;\">Crisis response<\u002Fstrong> dominates the budget. <strong style=\"color:#4F6140;\">Prevention<\u002Fstrong> remains a fraction of the total.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease .1s, transform .7s ease .1s; display:flex; flex-direction:column; gap:18px;\">\n          <div style=\"display:grid; grid-template-columns:1fr; gap:16px;\">\n            <div class=\"bar-row\" style=\"display:grid; grid-template-columns:170px 1fr 70px; align-items:center; gap:14px;\">\n              <span style=\"font-size:14px; font-weight:700; color:#211F1C;\">Emergency Shelters<\u002Fspan>\n              <div style=\"height:26px; background:rgba(33,31,28,0.06); border-radius:2px; overflow:hidden;\"><div style=\"height:100%; width:100%; background:#9A2D1F; transform-origin:left; animation:growBar 1.3s cubic-bezier(.22,1,.36,1) both;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"font-family:'Anton',sans-serif; font-size:18px; color:#9A2D1F; text-align:right;\">$1.14B<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"bar-row\" style=\"display:grid; grid-template-columns:170px 1fr 70px; align-items:center; gap:14px;\">\n              <span style=\"font-size:14px; font-weight:700; color:#211F1C;\">Supportive Housing<\u002Fspan>\n              <div style=\"height:26px; background:rgba(33,31,28,0.06); border-radius:2px; overflow:hidden;\"><div style=\"height:100%; width:50.8%; background:#A6342A; transform-origin:left; animation:growBar 1.3s cubic-bezier(.22,1,.36,1) .08s both;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"font-family:'Anton',sans-serif; font-size:18px; color:#A6342A; text-align:right;\">$579M<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"bar-row\" style=\"display:grid; grid-template-columns:170px 1fr 70px; align-items:center; gap:14px;\">\n              <span style=\"font-size:14px; font-weight:700; color:#211F1C;\">Transitional Housing<\u002Fspan>\n              <div style=\"height:26px; background:rgba(33,31,28,0.06); border-radius:2px; overflow:hidden;\"><div style=\"height:100%; width:15.9%; background:#B6503C; transform-origin:left; animation:growBar 1.3s cubic-bezier(.22,1,.36,1) .16s both;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"font-family:'Anton',sans-serif; font-size:18px; color:#B6503C; text-align:right;\">$181M<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"bar-row\" style=\"display:grid; grid-template-columns:170px 1fr 70px; align-items:center; gap:14px;\">\n              <span style=\"font-size:14px; font-weight:700; color:#211F1C;\">Community Outreach<\u002Fspan>\n              <div style=\"height:26px; background:rgba(33,31,28,0.06); border-radius:2px; overflow:hidden;\"><div style=\"height:100%; width:11.8%; background:#28384F; transform-origin:left; animation:growBar 1.3s cubic-bezier(.22,1,.36,1) .24s both;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"font-family:'Anton',sans-serif; font-size:18px; color:#28384F; text-align:right;\">$135M<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"bar-row\" style=\"display:grid; grid-template-columns:170px 1fr 70px; align-items:center; gap:14px;\">\n              <span style=\"font-size:14px; font-weight:700; color:#211F1C;\">Prevention &amp; Diversion<\u002Fspan>\n              <div style=\"height:26px; background:rgba(33,31,28,0.06); border-radius:2px; overflow:hidden;\"><div style=\"height:100%; width:7.7%; background:#4F6140; transform-origin:left; animation:growBar 1.3s cubic-bezier(.22,1,.36,1) .32s both;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"font-family:'Anton',sans-serif; font-size:18px; color:#4F6140; text-align:right;\">$88M<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"bar-row\" style=\"display:grid; grid-template-columns:170px 1fr 70px; align-items:center; gap:14px;\">\n              <span style=\"font-size:14px; font-weight:700; color:#211F1C;\">Caseload Support<\u002Fspan>\n              <div style=\"height:26px; background:rgba(33,31,28,0.06); border-radius:2px; overflow:hidden;\"><div style=\"height:100%; width:4%; background:#5E7150; transform-origin:left; animation:growBar 1.3s cubic-bezier(.22,1,.36,1) .4s both;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"font-family:'Anton',sans-serif; font-size:18px; color:#5E7150; text-align:right;\">$46M<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:10px 0 0; font-size:15.5px; line-height:1.6; color:#4A453E; border-left:3px solid #9A2D1F; padding-left:16px;\">Most spending is still concentrated at the <strong>crisis-response end<\u002Fstrong> of the system. Prevention and diversion represent a much smaller share of the total.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"reacting\" style=\"padding:clamp(56px,8vw,110px) clamp(20px,5vw,80px); background:#211F1C; color:#F5F0E6;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease; max-width:760px; margin-bottom:46px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#C9714E; margin-bottom:16px;\">The Pattern<\u002Fspan>\n        <h2 style=\"font-family:'Anton',sans-serif; font-weight:400; text-transform:uppercase; font-size:clamp(34px,5vw,60px); line-height:0.98; margin:0 0 8px; letter-spacing:0.01em;\">The system is reacting, not preventing.<\u002Fh2>\n        <p style=\"font-size:16px; letter-spacing:0.04em; text-transform:uppercase; font-weight:600; color:#9C958A; margin:0;\">Spending growth, 2024 → 2025<\u002Fp>\n      <\u002Fdiv>\n\n      <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease .1s, transform .7s ease .1s; display:grid; grid-template-columns:repeat(4,1fr); gap:16px;\" class=\"stat4\">\n        <div style=\"background:#2C2926; border:1px solid rgba(245,240,230,0.08); border-radius:3px; padding:26px 22px;\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"margin-bottom:14px;\"><path d=\"M12 20V5M6 11l6-6 6 6\" stroke=\"#C0392B\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <div style=\"font-family:'Anton',sans-serif; font-size:clamp(34px,4vw,48px); color:#C0392B; line-height:1;\">+10.4%<\u002Fdiv>\n          <p style=\"margin:10px 0 0; font-size:14.5px; color:#C7C0B5; line-height:1.4;\">Emergency Shelters<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#2C2926; border:1px solid rgba(245,240,230,0.08); border-radius:3px; padding:26px 22px;\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"margin-bottom:14px;\"><path d=\"M12 20V5M6 11l6-6 6 6\" stroke=\"#C0392B\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <div style=\"font-family:'Anton',sans-serif; font-size:clamp(34px,4vw,48px); color:#C0392B; line-height:1;\">+26.1%<\u002Fdiv>\n          <p style=\"margin:10px 0 0; font-size:14.5px; color:#C7C0B5; line-height:1.4;\">Transitional Housing<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#2C2926; border:1px solid rgba(245,240,230,0.08); border-radius:3px; padding:26px 22px;\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"margin-bottom:14px;\"><path d=\"M12 20V5M6 11l6-6 6 6\" stroke=\"#C0392B\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <div style=\"font-family:'Anton',sans-serif; font-size:clamp(34px,4vw,48px); color:#C0392B; line-height:1;\">+54.5%<\u002Fdiv>\n          <p style=\"margin:10px 0 0; font-size:14.5px; color:#C7C0B5; line-height:1.4;\">Community Outreach<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#2C2926; border:1px solid rgba(94,113,80,0.4); border-radius:3px; padding:26px 22px;\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"margin-bottom:14px;\"><path d=\"M12 4v15M6 13l6 6 6-6\" stroke=\"#7E9669\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <div style=\"font-family:'Anton',sans-serif; font-size:clamp(34px,4vw,48px); color:#7E9669; line-height:1;\">-10.4%<\u002Fdiv>\n          <p style=\"margin:10px 0 0; font-size:14.5px; color:#C7C0B5; line-height:1.4;\">Prevention &amp; Diversion<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease .15s, transform .7s ease .15s; display:grid; grid-template-columns:1.4fr 1fr; gap:24px; margin-top:32px; align-items:stretch;\" class=\"two-col\">\n        <p style=\"margin:0; font-size:clamp(16px,1.6vw,19px); line-height:1.6; color:#D9D2C5;\">The pattern shows growing pressure at the most urgent end of the system, while prevention and diversion <strong style=\"color:#F5F0E6;\">decreased.<\u002Fstrong> This is the cost of inaction: paying more after people reach crisis instead of investing earlier in stability.<\u002Fp>\n        <div style=\"background:linear-gradient(150deg,#3A3631,#2C2926); border:1px solid rgba(94,113,80,0.4); border-radius:3px; padding:28px; display:flex; flex-direction:column; justify-content:center;\">\n          <div style=\"display:flex; align-items:baseline; gap:6px;\"><span style=\"font-family:'Anton',sans-serif; font-size:clamp(40px,5vw,62px); color:#7E9669; line-height:1;\"><span data-counter=\"7\" data-prefix=\"$\">$7<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <p style=\"margin:8px 0 4px; font-size:15.5px; line-height:1.5; color:#E8E2D6; font-weight:600;\">Research suggests every dollar invested in prevention can reduce expensive emergency and crisis responses down the line.<\u002Fp>\n          <span style=\"font-size:11.5px; color:#9C958A; font-style:italic;\">Research suggests — Canadian Observatory on Homelessness.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"partners\" style=\"padding:clamp(56px,8vw,110px) clamp(20px,5vw,80px); background:#F5F0E6;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease; max-width:760px; margin-bottom:32px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#9A2D1F; margin-bottom:16px;\">From Crisis to Stability<\u002Fspan>\n        <h2 style=\"font-family:'Anton',sans-serif; font-weight:400; text-transform:uppercase; font-size:clamp(34px,5vw,60px); line-height:0.98; margin:0 0 16px; letter-spacing:0.01em;\">A community effort.<br>A system of solutions.<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.6; color:#4A453E; margin:0; max-width:60ch;\">No single organization can solve homelessness alone. Each partner works on a different part of the pathway from crisis to stability.<\u002Fp>\n      <\u002Fdiv>\n\n      <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease .1s, transform .7s ease .1s; display:flex; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:48px;\">\n        <span style=\"font-family:'Anton',sans-serif; text-transform:uppercase; font-size:15px; letter-spacing:0.03em; color:#F5F0E6; background:#9A2D1F; padding:11px 20px; border-radius:2px;\">Crisis<\u002Fspan>\n        <span style=\"color:#B6A98F; font-size:20px;\">→<\u002Fspan>\n        <span style=\"font-family:'Anton',sans-serif; text-transform:uppercase; font-size:15px; letter-spacing:0.03em; color:#F5F0E6; background:#B6503C; padding:11px 20px; border-radius:2px;\">Support<\u002Fspan>\n        <span style=\"color:#B6A98F; font-size:20px;\">→<\u002Fspan>\n        <span style=\"font-family:'Anton',sans-serif; text-transform:uppercase; font-size:15px; letter-spacing:0.03em; color:#F5F0E6; background:#28384F; padding:11px 20px; border-radius:2px;\">Prevention<\u002Fspan>\n        <span style=\"color:#B6A98F; font-size:20px;\">→<\u002Fspan>\n        <span style=\"font-family:'Anton',sans-serif; text-transform:uppercase; font-size:15px; letter-spacing:0.03em; color:#F5F0E6; background:#5E7150; padding:11px 20px; border-radius:2px;\">Housing<\u002Fspan>\n        <span style=\"color:#B6A98F; font-size:20px;\">→<\u002Fspan>\n        <span style=\"font-family:'Anton',sans-serif; text-transform:uppercase; font-size:15px; letter-spacing:0.03em; color:#F5F0E6; background:#4F6140; padding:11px 20px; border-radius:2px;\">Stability<\u002Fspan>\n      <\u002Fdiv>\n\n      <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease .15s, transform .7s ease .15s; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px;\">\n\n        <div style=\"display:flex; flex-direction:column; background:#FAF6EC; border:1px solid rgba(33,31,28,0.07); border-top:4px solid #28384F; border-radius:3px; padding:26px; transition:transform .25s ease, box-shadow .25s ease;\" style-hover=\"transform:translateY(-6px); box-shadow:0 22px 46px -26px rgba(33,31,28,0.5);\">\n          <div style=\"display:flex; align-items:center; gap:13px; margin-bottom:14px;\">\n            <span style=\"width:44px; height:44px; border-radius:10px; background:rgba(40,56,79,0.12); display:flex; align-items:center; justify-content:center; flex:none;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"4\" y=\"8\" width=\"7\" height=\"12\" stroke=\"#28384F\" stroke-width=\"1.8\"><\u002Frect><rect x=\"13\" y=\"4\" width=\"7\" height=\"16\" stroke=\"#28384F\" stroke-width=\"1.8\"><\u002Frect><path d=\"M3 20h18\" stroke=\"#28384F\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span style=\"font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#28384F;\">Policy &amp; Housing Supply<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Libre Franklin',sans-serif; font-size:18px; font-weight:800; margin:0 0 8px; line-height:1.2;\">Housing, Infrastructure &amp; Communities Canada / Build Canada Homes<\u002Fh3>\n          <p style=\"margin:0 0 20px; font-size:14.5px; line-height:1.55; color:#6B6459; flex:1;\">Invests in housing policy, funding, infrastructure, and long-term housing supply to support affordable homes across Canada.<\u002Fp>\n          <a href=\"https://housing-infrastructure.canada.ca/\" target=\"_blank\" rel=\"noopener\" style=\"align-self:flex-start; text-decoration:none; background:#28384F; color:#F5F0E6; font-size:13.5px; font-weight:700; padding:11px 20px; border-radius:2px;\" style-hover=\"opacity:0.88;\">Visit HICC →<\u002Fa>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; background:#FAF6EC; border:1px solid rgba(33,31,28,0.07); border-top:4px solid #9A2D1F; border-radius:3px; padding:26px; transition:transform .25s ease, box-shadow .25s ease;\" style-hover=\"transform:translateY(-6px); box-shadow:0 22px 46px -26px rgba(33,31,28,0.5);\">\n          <div style=\"display:flex; align-items:center; gap:13px; margin-bottom:14px;\">\n            <span style=\"width:44px; height:44px; border-radius:10px; background:rgba(154,45,31,0.12); display:flex; align-items:center; justify-content:center; flex:none;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"7\" r=\"3.4\" stroke=\"#9A2D1F\" stroke-width=\"1.8\"><\u002Fcircle><path d=\"M5 20c0-3.9 3.1-6.5 7-6.5s7 2.6 7 6.5\" stroke=\"#9A2D1F\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span style=\"font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#9A2D1F;\">Youth Crisis Support<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Libre Franklin',sans-serif; font-size:18px; font-weight:800; margin:0 0 8px; line-height:1.2;\">Youth Services Bureau (YSB)<\u002Fh3>\n          <p style=\"margin:0 0 20px; font-size:14.5px; line-height:1.55; color:#6B6459; flex:1;\">Provides youth with shelter, housing support, counselling, employment services, and crisis support.<\u002Fp>\n          <a href=\"https://www.ysb.ca/\" target=\"_blan in:0 0 8px; letter-spacing:0.02em;\">Advocate<\u002Fh3>\n          <p style=\"margin:0; font-size:14.5px; line-height:1.5; color:#F4DDD6;\">Raise awareness and push for prevention-focused housing solutions.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:rgba(245,240,230,0.08); border:1px solid rgba(245,240,230,0.18); border-radius:3px; padding:26px; transition:background .25s ease;\" style-hover=\"background:rgba(245,240,230,0.15);\">\n          <span style=\"width:46px; height:46px; border-radius:50%; background:#F5F0E6; display:flex; align-items:center; justify-content:center; margin-bottom:16px;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"7\" cy=\"9\" r=\"2.4\" stroke=\"#9A2D1F\" stroke-width=\"1.8\"><\u002Fcircle><circle cx=\"17\" cy=\"9\" r=\"2.4\" stroke=\"#9A2D1F\" stroke-width=\"1.8\"><\u002Fcircle><path d=\"M2 19c0-2.8 2.2-4.5 5-4.5M22 19c0-2.8-2.2-4.5-5-4.5M9 14h6\" stroke=\"#9A2D1F\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <h3 style=\"font-family:'Anton',sans-serif; text-transform:uppercase; font-size:22px; margin:0 0 8px; letter-spacing:0.02em;\">Partner<\u002Fh3>\n          <p style=\"margin:0; font-size:14.5px; line-height:1.5; color:#F4DDD6;\">Collaborate with community organizations to build stronger, safer communities.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-fade=\"\" style=\"opacity:0; transform:translateY(24px); transition:opacity .7s ease .2s, transform .7s ease .2s; margin-top:48px; text-align:center; border-top:1px solid rgba(245,240,230,0.2); padding-top:48px;\">\n        <p style=\"font-family:'Anton',sans-serif; text-transform:uppercase; font-size:clamp(26px,4vw,46px); line-height:1.05; margin:0 0 28px; letter-spacing:0.01em;\">Don't just witness the cost of inaction.<br><span style=\"color:#FAD9A0;\">Help change the story.<\u002Fspan><\u002Fp>\n        <div style=\"display:flex; gap:14px; flex-wrap:wrap; justify-content:center;\">\n          <button onclick=\"{{ goPartners }}\" style=\"background:#F5F0E6; border:none; color:#9A2D1F; font-family:'Libre Franklin',sans-serif; font-size:15px; font-weight:800; letter-spacing:0.02em; padding:16px 30px; border-radius:2px; cursor:pointer;\" style-hover=\"background:#fff;\">Support a Partner<\u002Fbutton>\n          <button onclick=\"{{ share }}\" style=\"background:transparent; border:1.5px solid rgba(245,240,230,0.5); color:#F5F0E6; font-family:'Libre Franklin',sans-serif; font-size:15px; font-weight:800; letter-spacing:0.02em; padding:16px 30px; border-radius:2px; cursor:pointer;\" style-hover=\"border-color:#fff; background:rgba(245,240,230,0.1);\">{{ shareLabel }}<\u002Fbutton>\n          <button onclick=\"{{ goData }}\" style=\"background:transparent; border:1.5px solid rgba(245,240,230,0.5); color:#F5F0E6; font-family:'Libre Franklin',sans-serif; font-size:15px; font-weight:800; letter-spacing:0.02em; padding:16px 30px; border-radius:2px; cursor:pointer;\" style-hover=\"border-color:#fff; background:rgba(245,240,230,0.1);\">Learn More<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#1A1816; color:#C7C0B5; padding:clamp(48px,7vw,80px) clamp(20px,5vw,80px) 40px;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div class=\"foot2\" style=\"display:grid; grid-template-columns:1fr 1.4fr; gap:clamp(28px,5vw,64px); align-items:start;\">\n        <div>\n          <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:16px;\">\n            <span style=\"display:inline-block; width:13px; height:13px; background:#9A2D1F; border-radius:50%;\"><\u002Fspan>\n            <span style=\"font-family:'Anton',sans-serif; letter-spacing:0.03em; font-size:20px; color:#F5F0E6; text-transform:uppercase;\">The Cost of Inaction<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:0; font-size:14px; line-height:1.6; color:#9C958A; max-width:34ch;\">A data-driven storytelling campaign on affordability, housing insecurity, and homelessness in Ontario.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <h4 style=\"font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#C9714E; margin:0 0 16px;\">Sources<\u002Fh4>\n          <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:11px;\">\n            <li style=\"font-size:13.5px; line-height:1.5; color:#B6AFA3;\">Association of Municipalities of Ontario. (2025). <em>Under Pressure: Ontario's Homelessness Crisis.<\u002Fem><\u002Fli>\n            <li style=\"font-size:13.5px; line-height:1.5; color:#B6AFA3;\">Association of Municipalities of Ontario. (2026). <em>Municipalities Under Pressure: One Year Later.<\u002Fem><\u002Fli>\n            <li style=\"font-size:13.5px; line-height:1.5; color:#B6AFA3;\">Canadian Observatory on Homelessness / Homeless Hub. Homelessness prevention and research resources.<\u002Fli>\n            <li style=\"font-size:13.5px; line-height:1.5; color:#B6AFA3;\">Housing, Infrastructure and Communities Canada. National homelessness and shelter data resources.<\u002Fli>\n            <li style=\"font-size:13.5px; line-height:1.5; color:#B6AFA3;\">Partner organization websites: HICC, YSB, Trek for Teens, Reena, York Community Safety, BetterStreet, and 360°kids.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:40px; padding-top:24px; border-top:1px solid rgba(245,240,230,0.12); display:flex; flex-wrap:wrap; gap:12px; justify-content:space-between; align-items:center;\">\n        <span style=\"font-size:12.5px; color:#7E776C; font-style:italic;\">This platform was created as part of a student awareness campaign for C4 Capstone Day.<\u002Fspan>\n        <span style=\"font-size:12.5px; color:#7E776C;\">Cross-Campus Capstone Classroom · The Cost of Inaction<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { shareLabel: 'Share the Campaign' };\n\n  componentDidMount() { this.initReveal(); }\n\n  // Fade-ins and bar growth are pure CSS animations (robust against React style\n  // resets). The only thing JS drives is the count-up. Animations are paused while\n  // the document is hidden, so we gate on visibility and re-run on visibilitychange\n  // — counters never get stuck at their initial 0.\n  initReveal() {\n    if (this._revealInit) return;\n    this._revealInit = true;\n    this.counted = new Set();\n    this.runCounters();\n    this.onVis = () => { if (!document.hidden) this.runCounters(); };\n    document.addEventListener('visibilitychange', this.onVis);\n    this._timers = [300, 900, 1800].map((t) => setTimeout(() => this.runCounters(), t));\n  }\n\n  runCounters() {\n    if (typeof document !== 'undefined' && document.hidden) return;\n    document.querySelectorAll('[data-counter]').forEach((el) => {\n      if (!this.counted.has(el)) { this.counted.add(el); this.animateCount(el); }\n    });\n  }\n\n  componentWillUnmount() {\n    if (this.onVis) document.removeEventListener('visibilitychange', this.onVis);\n    (this._timers || []).forEach(clearTimeout);\n  }\n\n  animateCount(el) {\n    const target = parseFloat(el.getAttribute('data-counter'));\n    const dec = parseInt(el.getAttribute('data-decimals') || '0', 10);\n    const prefix = el.getAttribute('data-prefix') || '';\n    const suffix = el.getAttribute('data-suffix') || '';\n    const dur = 1800;\n    const start = performance.now();\n    const fmt = (n) => prefix + (dec > 0 ? n.toFixed(dec) : Math.round(n).toLocaleString('en-US')) + suffix;\n    const tick = (now) => {\n      let p = Math.min(1, (now - start) / dur);\n      p = 1 - Math.pow(1 - p, 3);\n      el.textContent = fmt(target * p);\n      if (p < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n\n  scrollTo(id) {\n    const el = document.getElementById(id);\n    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 64, behavior: 'smooth' });\n  }\n\n  share() {\n    const text = 'Homelessness in Ontario could more than triple by 2035. Explore The Cost of Inaction.';\n    const done = () => { this.setState({ shareLabel: 'Copied to clipboard!' }); setTimeout(() => this.setState({ shareLabel: 'Share the Campaign' }), 2400); };\n    if (navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(text).then(done).catch(done);\n    } else { done(); }\n  }\n\n  renderVals() {\n    if (typeof window !== 'undefined') { window.__rvCount = (window.__rvCount || 0) + 1; setTimeout(() => this.initReveal(), 0); }\n    return {\n      shareLabel: this.state.shareLabel,\n      whyCards: this.renderWhyCards(),\n      goWhy: () => this.scrollTo('why'),\n      goData: () => this.scrollTo('spending'),\n      goPartners: () => this.scrollTo('partners'),\n      goAction: () => this.scrollTo('action'),\n      share: () => this.share(),\n    };\n  }\n\n  card(icon, title, desc) {\n    const wrap = { background: '#FAF6EC', border: '1px solid rgba(33,31,28,0.07)', borderRadius: '3px', padding: '26px 24px', transition: 'transform .25s ease, box-shadow .25s ease, border-color .25s ease' };\n    const onEnter = (e) => { e.currentTarget.style.transform = 'translateY(-5px)'; e.currentTarget.style.boxShadow = '0 18px 40px -22px rgba(33,31,28,0.45)'; e.currentTarget.style.borderColor = 'rgba(154,45,31,0.35)'; };\n    const onLeave = (e) => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = 'none'; e.currentTarget.style.borderColor = 'rgba(33,31,28,0.07)'; };\n    return React.createElement('div', { style: wrap, onMouseEnter: onEnter, onMouseLeave: onLeave },\n      React.createElement('div', { style: { width: '48px', height: '48px', borderRadius: '50%', background: 'rgba(154,45,31,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '18px' }, dangerouslySetInnerHTML: { __html: icon } }),\n      React.createElement('h3', { style: { fontFamily: \"'Libre Franklin',sans-serif\", fontSize: '17px', fontWeight: 800, margin: '0 0 7px', letterSpacing: '0.01em' } }, title),\n      React.createElement('p', { style: { margin: 0, fontSize: '14.5px', lineHeight: 1.5, color: '#6B6459' } }, desc)\n    );\n  }\n\n  renderWhyCards() {\n    const c = '#9A2D1F';\n    const ic = {\n      health: `<svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 21s-7.5-4.7-9.5-9.2C1 8.4 3 5 6.3 5c2 0 3.2 1.2 3.9 2.4l1.8 3 1.6-2.6c.7-1.2 1.9-2.8 4.1-2.8C21 5 23 8.4 21.5 11.8 19.5 16.3 12 21 12 21Z\" stroke=\"${c}\" stroke-width=\"1.8\" stroke-linejoin=\"round\"/><path d=\"M5 12h3l1.5-3 2 6 1.5-3h6\" stroke=\"${c}\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>`,\n      emergency: `<svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3 2 20h20L12 3Z\" stroke=\"${c}\" stroke-width=\"1.8\" stroke-linejoin=\"round\"/><path d=\"M12 9v5\" stroke=\"${c}\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><circle cx=\"12\" cy=\"17\" r=\"1.1\" fill=\"${c}\"/><\u002Fsvg>`,\n      shelter: `<svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 11 12 4l9 7\" stroke=\"${c}\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M5 10v9h14v-9\" stroke=\"${c}\" stroke-width=\"1.8\" stroke-linejoin=\"round\"/><path d=\"M10 19v-5h4v5\" stroke=\"${c}\" stroke-width=\"1.8\" stroke-linejoin=\"round\"/><\u002Fsvg>`,\n      justice: `<svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3v18M7 21h10M5 7h14M12 5l-5 1m5-1 5 1\" stroke=\"${c}\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><path d=\"M7 6 4 13h6L7 6Zm10 0-3 7h6l-3-7Z\" stroke=\"${c}\" stroke-width=\"1.8\" stroke-linejoin=\"round\"/><\u002Fsvg>`,\n      economy: `<svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 20h16\" stroke=\"${c}\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><rect x=\"5\" y=\"11\" width=\"3.2\" height=\"7\" stroke=\"${c}\" stroke-width=\"1.8\"/><rect x=\"10.4\" y=\"7\" width=\"3.2\" height=\"11\" stroke=\"${c}\" stroke-width=\"1.8\"/><rect x=\"15.8\" y=\"13\" width=\"3.2\" height=\"5\" stroke=\"${c}\" stroke-width=\"1.8\"/><\u002Fsvg>`,\n      lives: `<svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 21s-7.5-4.7-9.5-9.2C1 8.4 3 5 6.3 5c2.4 0 4 1.7 5.7 4 1.7-2.3 3.3-4 5.7-4C21 5 23 8.4 21.5 11.8 19.5 16.3 12 21 12 21Z\" stroke=\"${c}\" stroke-width=\"1.8\" stroke-linejoin=\"round\"/><\u002Fsvg>`\n    };\n    const data = [\n      [ic.health, 'Healthcare', 'Strained systems and overburdened hospitals as crises go untreated.'],\n      [ic.emergency, 'Emergency Services', 'More crisis calls and higher demand on first responders.'],\n      [ic.shelter, 'Shelters', 'Rising demand and limited capacity push the system to its limits.'],\n      [ic.justice, 'Justice System', 'Higher legal, court, and policing costs across communities.'],\n      [ic.economy, 'Economy', 'Lost productivity and reduced tax revenue for everyone.'],\n      [ic.lives, 'Human Lives', 'Trauma, chronic stress, and lost human potential.']\n    ];\n    return data.map((d, i) => React.createElement('div', { key: i }, this.card(d[0], d[1], d[2])));\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
